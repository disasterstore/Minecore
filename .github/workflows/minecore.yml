name: Tailscale Session

on:
  workflow_dispatch:

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale
        run: |
          sudo tailscaled &
          sleep 10
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Create user anurag
        run: |
          if ! id -u anurag >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash anurag
          fi

          echo "anurag:anuragxd1232" | sudo chpasswd
          sudo usermod -aG sudo anurag
          echo "anurag ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/anurag

      - name: Show Tailscale IP
        run: |
          tailscale ip -4

      - name: Keep session alive 1
        run: sleep 3600

      - name: Keep session alive 2
        run: sleep 3600

      - name: Keep session alive 3
        run: sleep 3600

      - name: Keep session alive 4
        run: sleep 3600

      - name: Keep session alive 5
        run: sleep 3600

      - name: Keep session alive 6
        run: sleep 3600

      - name: Keep session alive 7
        run: sleep 3600

      - name: Keep session alive 8
        run: sleep 3600

      - name: Keep session alive 9
        run: sleep 3600

      - name: Keep session alive 10
        run: sleep 3600

      - name: Keep session alive 11
        run: sleep 3600

      - name: Keep session alive 12
        run: sleep 3600

      - name: Keep session alive 13
        run: sleep 3600

      - name: Keep session alive 14
        run: sleep 3600

      - name: Keep session alive 15
        run: sleep 3600

      - name: Keep session alive 16
        run: sleep 3600

      - name: Keep session alive 17
        run: sleep 3600

      - name: Keep session alive 18
        run: sleep 3600

      - name: Keep session alive 19
        run: sleep 3600

      - name: Keep session alive 20
        run: sleep 3600

      - name: Keep session alive 21
        run: sleep 3600

      - name: Keep session alive 22
        run: sleep 3600

      - name: Keep session alive 23
